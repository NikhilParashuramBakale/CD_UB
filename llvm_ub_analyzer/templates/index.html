<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LLVM UB Analyzer</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #0f766e;
      --accent-hover: #115e59;
      --danger-bg: #fef2f2;
      --danger-text: #991b1b;
      --border: #d1d5db;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top right, #dbeafe 0%, var(--bg) 45%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: min(760px, 100%);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(31, 41, 55, 0.08);
      padding: 28px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 1.9rem;
    }

    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.5;
    }

    form {
      display: grid;
      gap: 14px;
    }

    input[type="file"] {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      background: #fff;
    }

    button {
      border: none;
      border-radius: 10px;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      font-size: 1rem;
      padding: 11px 16px;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    button:hover {
      background: var(--accent-hover);
    }

    .error {
      border: 1px solid #fecaca;
      background: var(--danger-bg);
      color: var(--danger-text);
      border-radius: 10px;
      padding: 10px 12px;
      margin-bottom: 12px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>LLVM UB Analyzer</h1>
    <p>Upload a C file to compile it to LLVM IR at O0 and O2, compare both outputs, and see a UB-aware explanation.</p>

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}

    <form action="/analyze" method="post" enctype="multipart/form-data">
      <input type="file" name="cfile" accept=".c" required>
      <button type="submit">Analyze with LLVM</button>
    </form>
  </main>
</body>
</html>
